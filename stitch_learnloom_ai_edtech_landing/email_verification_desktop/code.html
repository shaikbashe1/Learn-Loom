<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        
        .floating-shape-1 {
            animation: float1 15s ease-in-out infinite alternate;
        }
        .floating-shape-2 {
            animation: float2 20s ease-in-out infinite alternate-reverse;
        }
        .floating-shape-3 {
            animation: float3 18s ease-in-out infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(50px, -50px) rotate(45deg) scale(1.1); }
            100% { transform: translate(-30px, 30px) rotate(-15deg) scale(0.9); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(-60px, 40px) rotate(-30deg) scale(1.15); }
            100% { transform: translate(40px, -60px) rotate(20deg) scale(0.95); }
        }
        @keyframes float3 {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 60px) scale(1.2); }
            100% { transform: translate(-40px, -20px) scale(0.85); }
        }

        .success-glow {
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
        }
    </style>

<div class="glass-panel rounded-[24px] p-stack-xl flex flex-col items-center text-center">
<!-- Icon/Badge Area -->
<div class="relative mb-stack-lg">
<div class="absolute inset-0 bg-success/20 rounded-full filter blur-xl animate-pulse"></div>
<div class="relative w-32 h-32 bg-surface rounded-full flex items-center justify-center success-glow border-2 border-success">
<span class="material-symbols-outlined text-[64px] text-success" style="font-variation-settings: 'FILL' 1;">

<!-- Decorative sparks -->
<span class="material-symbols-outlined absolute -top-4 -right-4 text-warning text-3xl animate-bounce">auto_awesome</span>
<span class="material-symbols-outlined absolute -bottom-2 -left-4 text-tertiary text-2xl animate-pulse delay-100">auto_awesome</span>
</div>

            </p>
