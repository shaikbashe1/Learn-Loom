<body class="bg-background text-text-primary min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
<!-- Ambient Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-surface-container-high/40 blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-surface-variant/30 blur-[100px] pointer-events-none z-0"></div>
<!-- Main Container -->
<main class="flex-grow flex items-center justify-center relative z-10 px-margin-desktop py-stack-xl">
<!-- Glassmorphism Card -->
<div class="w-full max-w-[480px] bg-surface/70 backdrop-blur-xl border border-border-base/50 rounded-xl shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] p-stack-lg flex flex-col items-center">
<!-- Brand Logo / Header -->
<div class="mb-stack-lg text-center w-full">
<div class="flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-[48px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        lock_reset
                    </span>
</div>
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-stack-sm tracking-tight">Forgot Password</h1>
<p class="font-body-md text-body-md text-text-secondary px-stack-md">
                    Enter your email address and we'll send you a link to reset your password.
                </p>
</div>
<!-- Form -->
<form class="w-full space-y-stack-md">
<!-- Email Input -->
<div class="flex flex-col space-y-stack-sm w-full">
<label class="font-label-md text-label-md text-text-primary text-left" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface border border-border-base rounded-lg font-body-md text-body-md text-text-primary placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 shadow-sm" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary py-4 px-6 rounded-lg font-label-md text-label-md shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.23)] hover:-translate-y-[1px] transition-all duration-200 flex justify-center items-center gap-2" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined text-[20px]">send</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="mt-stack-lg w-full text-center border-t border-border-base/50 pt-stack-md">
<a class="inline-flex items-center gap-2 font-label-md text-label-md text-text-secondary hover:text-primary transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
