<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.5);
        }
        .ai-gradient-border {
            position: relative;
            background: clip-padding-box;
            border: 2px solid transparent;
            border-radius: 0.75rem;
        }
        .ai-gradient-border::before {
            content: "";
            position: absolute;
            top: -2px; bottom: -2px;
            left: -2px; right: -2px;
            background: linear-gradient(to right, #632ecd, #57dffe);
            z-index: -1;
            border-radius: 0.85rem;
        }
        .progress-gradient {
            background: linear-gradient(90deg, #2563eb, #57dffe);
        }
      </style>

<body class="bg-background text-text-primary h-full overflow-hidden flex flex-col font-body-md">
<!-- Top AppBar - Suppressed standard nav elements for focused onboarding, keeping brand anchor -->
<header class="bg-surface/70 backdrop-blur-xl docked full-width top-0 z-40 shadow-sm flex justify-between items-center w-full px-margin-desktop h-20 sticky top-0">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-headline-md text-headline-md font-bold text-primary">LearnLoom</span>
</div>
<div class="text-text-secondary font-label-md text-label-md">
            Step 1 of 5
        </div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto relative p-margin-desktop flex flex-col items-center justify-center">
<!-- Background decorative elements -->
<div class="fixed top-20 left-20 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-20 right-20 w-96 h-96 bg-secondary-container/10 rounded-full blur-3xl pointer-events-none"></div>
<!-- Progress Tracker -->
<div class="w-full max-w-3xl mb-stack-lg">
<div class="h-2 w-full bg-border-base rounded-full overflow-hidden">
<div class="h-full progress-gradient w-1/5 transition-all duration-500 rounded-full"></div>
</div>
<div class="flex justify-between mt-stack-sm text-text-secondary font-label-sm text-label-sm">
<span class="text-primary font-semibold">Personal Info</span>
<span>Skills</span>
<span>Goals</span>
<span>Preferences</span>
<span>AI Setup</span>
</div>
</div>
<!-- Onboarding Card (Step 1: Personal Info) -->
<div class="glass-panel w-full max-w-3xl rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-stack-xl flex flex-col md:flex-row gap-stack-lg relative z-10 transition-transform hover:-translate-y-1 duration-300">
<!-- Left Side: Form -->
<div class="flex-1 flex flex-col gap-stack-md">
<div>
<h1 class="font-headline-lg text-headline-lg text-text-primary mb-stack-sm">Welcome to LearnLoom</h1>
<p class="font-body-md text-body-md text-text-secondary">Let's personalize your AI learning journey. Tell us a bit about yourself.</p>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-text-primary">Full Name</label>
<input class="w-full p-4 border border-border-base rounded-lg bg-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow font-body-md text-body-md" placeholder="e.g., Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-text-primary">Country / Region</label>
<select class="w-full p-4 border border-border-base rounded-lg bg-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow font-body-md text-body-md text-text-secondary">
<option>Select Country</option>
<option>United States</option>
<option>United Kingdom</option>
<option>Canada</option>
<option>India</option>
</select>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-text-primary">Current Education / Role</label>
<input class="w-full p-4 border border-border-base rounded-lg bg-surface focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow font-body-md text-body-md" placeholder="e.g., Computer Science Student" type="text"/>
</div>
</div>
<!-- Right Side: Avatar Upload -->
<div class="w-full md:w-1/3 flex flex-col items-center justify-center border-2 border-dashed border-border-base rounded-xl p-stack-md bg-surface-bright/50 hover:bg-surface-bright transition-colors cursor-pointer group">
<div class="w-32 h-32 rounded-full bg-surface-container flex items-center justify-center mb-stack-sm relative overflow-hidden group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-4xl text-text-secondary group-hover:text-primary transition-colors">add_a_photo</span>
</div>
<span class="font-label-md text-label-md text-primary font-semibold text-center">Upload Photo</span>
<span class="font-label-sm text-label-sm text-text-secondary text-center mt-1">PNG, JPG up to 5MB</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-3xl flex justify-end gap-stack-md mt-stack-lg relative z-10">
<button class="px-8 py-3 rounded-lg font-label-md text-label-md text-text-secondary hover:bg-surface-container-low transition-colors">Skip for now</button>
<button class="px-8 py-3 rounded-lg font-label-md text-label-md bg-primary-container text-on-primary-container hover:bg-primary-fixed-variant transition-colors shadow-sm flex items-center gap-2">
                Continue
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</main>
