<style>

<body class="bg-background text-text-primary antialiased min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-primary-container selection:text-white">
<!-- Abstract Ambient Background -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<div class="bg-blob-1 absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary/10 blur-[80px] mix-blend-multiply opacity-70"></div>
<div class="bg-blob-2 absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-secondary-container/20 blur-[100px] mix-blend-multiply opacity-60"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="bg-white/70 backdrop-blur-xl border border-white/50 rounded-[1.5rem] shadow-[0_8px_32px_-4px_rgba(0,0,0,0.06),_0_4px_12px_-2px_rgba(0,0,0,0.04)] p-6 md:p-8 w-full flex flex-col gap-stack-lg relative overflow-hidden">
<!-- Shimmer effect overlay for premium feel -->
<div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/20 to-white/0 pointer-events-none"></div>
<!-- Header Section -->
<div class="flex flex-col items-center text-center relative z-10">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-stack-md shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary tracking-tight mb-1">Welcome back</h1>
<p class="font-body-md text-body-md text-text-secondary">Log in to LearnLoom to continue your journey.</p>
</div>
<!-- Form Section -->
<form action="#" class="flex flex-col gap-stack-md relative z-10" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-text-primary ml-1" for="email">Email address</label>
<div class="relative flex items-center input-focus-ring rounded-xl transition-all duration-200 border border-border-base bg-surface-container-lowest">
<span class="material-symbols-outlined text-text-secondary ml-4 text-xl absolute left-0 pointer-events-none">mail</span>
<input class="w-full bg-transparent border-none py-3.5 pl-11 pr-4 font-body-md text-body-md text-text-primary placeholder:text-text-secondary/60 focus:ring-0 rounded-xl" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-text-primary ml-1" for="password">Password</label>
<div class="relative flex items-center input-focus-ring rounded-xl transition-all duration-200 border border-border-base bg-surface-container-lowest">
<span class="material-symbols-outlined text-text-secondary ml-4 text-xl absolute left-0 pointer-events-none">lock</span>
<input class="w-full bg-transparent border-none py-3.5 pl-11 pr-11 font-body-md text-body-md text-text-primary placeholder:text-text-secondary/60 focus:ring-0 rounded-xl" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 text-text-secondary hover:text-text-primary transition-colors flex items-center justify-center p-1 rounded-md hover:bg-surface-container-low" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-1 mb-2">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-border-base text-primary-container focus:ring-primary-container/30 bg-surface-container-lowest cursor-pointer transition-colors" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-text-secondary cursor-pointer" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary-container hover:text-on-primary-fixed-variant transition-colors hover:underline decoration-primary-container/30 underline-offset-4" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm font-label-md text-label-md text-on-primary-container bg-primary-container hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-all duration-200 active:scale-[0.98]" type="submit">
                    Log in
                </button>
</form>
<!-- Divider -->
<div class="relative z-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-base/80"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-white/80 font-body-sm text-body-sm text-text-secondary backdrop-blur-md rounded-full">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="flex flex-col gap-stack-sm relative z-10">
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 border border-border-base rounded-xl bg-surface-container-lowest hover:bg-surface-container-low font-label-md text-label-md text-text-primary transition-all duration-200 active:scale-[0.98] shadow-sm" type="button">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 border border-border-base rounded-xl bg-surface-container-lowest hover:bg-surface-container-low font-label-md text-label-md text-text-primary transition-all duration-200 active:scale-[0.98] shadow-sm" type="button">
<svg aria-hidden="true" class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>

                </button>
</div>
<!-- Footer -->
<p class="mt-2 text-center font-body-sm text-body-sm text-text-secondary relative z-10">
                Don't have an account? 
                <a class="font-label-md text-label-md text-primary-container hover:text-on-primary-fixed-variant transition-colors hover:underline decoration-primary-container/30 underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
