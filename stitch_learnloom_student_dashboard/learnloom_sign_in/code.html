<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - LearnLoom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error-container": "#ffdad6",
                      "tertiary-container": "#d97721",
                      "secondary-fixed": "#f0dbff",
                      "surface-low": "#1c1b1d",
                      "primary-fixed": "#e1e0ff",
                      "on-secondary-container": "#d6a9ff",
                      "on-primary-fixed-variant": "#2f2ebe",
                      "background": "#131315",
                      "on-tertiary-fixed": "#301400",
                      "outline": "#908fa0",
                      "tertiary": "#ffb783",
                      "on-secondary": "#490080",
                      "primary": "#c0c1ff",
                      "on-secondary-fixed-variant": "#6900b3",
                      "gold-tier": "#ffb783",
                      "surface-tint": "#c0c1ff",
                      "surface-container-low": "#1c1b1d",
                      "inverse-on-surface": "#313032",
                      "error-container": "#93000a",
                      "surface": "#131315",
                      "on-tertiary-fixed-variant": "#713700",
                      "inverse-surface": "#e5e1e4",
                      "surface-container": "#201f22",
                      "on-background": "#e5e1e4",
                      "secondary-container": "#6f00be",
                      "outline-variant": "#464554",
                      "on-tertiary-container": "#451f00",
                      "on-surface-variant": "#c7c4d7",
                      "secondary-fixed-dim": "#ddb7ff",
                      "primary-fixed-dim": "#c0c1ff",
                      "on-error": "#690005",
                      "surface-container-lowest": "#0e0e10",
                      "outline-muted": "#464554",
                      "surface-dim": "#131315",
                      "on-primary-fixed": "#07006c",
                      "secondary": "#ddb7ff",
                      "primary-container": "#8083ff",
                      "on-secondary-fixed": "#2c0051",
                      "on-tertiary": "#4f2500",
                      "surface-container-highest": "#353437",
                      "surface-variant": "#353437",
                      "surface-lowest": "#0e0e10",
                      "tertiary-fixed": "#ffdcc5",
                      "on-surface": "#e5e1e4",
                      "surface-bright": "#39393b",
                      "on-primary": "#1000a9",
                      "error": "#ffb4ab",
                      "inverse-primary": "#494bd6",
                      "tertiary-fixed-dim": "#ffb783",
                      "surface-container-high": "#2a2a2c",
                      "on-primary-container": "#0d0096"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xl": "2rem",
                      "gutter": "1.5rem",
                      "2xl": "3rem",
                      "md": "1rem",
                      "sm": "0.5rem",
                      "margin": "2rem",
                      "xs": "0.25rem",
                      "lg": "1.5rem"
              },
              "fontFamily": {
                      "label-sm": ["JetBrains Mono"],
                      "headline-lg": ["Geist"],
                      "body-md": ["Geist"],
                      "body-lg": ["Geist"],
                      "headline-lg-mobile": ["Geist"],
                      "label-md": ["JetBrains Mono"],
                      "headline-md": ["Geist"],
                      "display": ["Geist"]
              },
              "fontSize": {
                      "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "label-md": ["14px", {"lineHeight": "1.2", "fontWeight": "500"}],
                      "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.05em", "fontWeight": "700"}]
              }
            }
          }
        }
    </script>
<style>
        /* Nebula Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(192, 193, 255, 0.05) 0%, rgba(19, 19, 21, 1) 70%);
            z-index: -2;
        }
        .nebula-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: 20%; width: 40vw; height: 40vw; background: rgba(128, 131, 255, 0.15); }
        .blob-2 { bottom: -10%; right: 10%; width: 50vw; height: 50vw; background: rgba(221, 183, 255, 0.1); animation-delay: -5s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Input Styles */
        .tech-input {
            background-color: theme('colors.surface-container');
            border: 1px solid theme('colors.outline-variant');
            color: theme('colors.on-surface');
            transition: all 0.2s ease;
        }
        .tech-input:focus {
            border-color: theme('colors.primary');
            outline: none;
            box-shadow: 0 0 0 1px theme('colors.primary');
            background-color: theme('colors.surface-container-high');
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Abstract Background -->
<div class="nebula-blob blob-1"></div>
<div class="nebula-blob blob-2"></div>
<!-- Login Container -->
<main class="w-full max-w-md relative z-10">
<!-- Brand Header -->
<div class="text-center mb-2xl">
<h1 class="font-display text-display text-primary tracking-tight mb-sm">LearnLoom</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Engineer your potential.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest/80 backdrop-blur-xl border border-outline-variant/60 rounded-xl p-2xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] relative group transition-all duration-300 hover:border-outline-variant">
<form action="#" class="flex flex-col gap-xl" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="email">USER_IDENTIFIER</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-muted" data-icon="mail">mail</span>
<input class="tech-input w-full rounded-full py-md pl-[3.5rem] pr-md font-body-md text-body-md placeholder:text-outline" id="email" name="email" placeholder="developer@domain.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">AUTH_KEY</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-muted" data-icon="lock">lock</span>
<input class="tech-input w-full rounded-full py-md pl-[3.5rem] pr-md font-body-md text-body-md placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md rounded-full py-md mt-sm hover:bg-primary-fixed transition-colors shadow-[0_0_15px_rgba(192,193,255,0.2)] hover:shadow-[0_0_20px_rgba(192,193,255,0.4)] active:scale-[0.98]" type="submit">
                    Initialize Session
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-md my-xl">
<div class="h-px bg-outline-variant/50 flex-1"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">or authenticate via</span>
<div class="h-px bg-outline-variant/50 flex-1"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm bg-surface-container-high border border-outline-variant/50 rounded-full py-md hover:bg-surface-bright hover:border-outline-variant transition-colors font-label-md text-label-md text-on-surface">
<span class="material-symbols-outlined text-[20px]" data-icon="code">code</span>
                    GitHub
                </button>
<button class="flex items-center justify-center gap-sm bg-surface-container-high border border-outline-variant/50 rounded-full py-md hover:bg-surface-bright hover:border-outline-variant transition-colors font-label-md text-label-md text-on-surface">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
                    Google
                </button>
</div>
<!-- Signup Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    No active instance? <a class="text-primary hover:text-primary-fixed hover:underline transition-all" href="#">Provision Account</a>
</p>
</div>
</div>
</main>
</body></html>
