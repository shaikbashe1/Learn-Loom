<body class="min-h-screen flex items-center justify-center p-gutter relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md z-10">
<!-- Brand / Header -->
<div class="text-center mb-xl">
<h1 class="font-display text-display text-primary tracking-tight mb-sm">LearnLoom</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure Account Recovery</p>
</div>
<!-- Form Card -->
<div class="glass-card rounded-xl p-2xl">
<div class="flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-high border border-outline-variant mb-lg mx-auto">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<h2 class="font-headline-md text-headline-md text-center mb-sm">Forgot Password?</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-xl">
                Enter the email address associated with your account, and we'll send you a secure link to reset your password.
            </p>
<form action="#" class="space-y-lg" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative input-glow rounded-lg transition-all duration-200 bg-surface-container border border-outline-variant group">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm bg-transparent border-none text-on-surface font-body-md text-body-md placeholder:text-on-surface-variant/50 focus:ring-0 rounded-lg" id="email" name="email" placeholder="developer@learnloom.io" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm px-md rounded-lg hover:bg-primary-fixed-dim transition-colors flex items-center justify-center gap-xs shadow-[0_0_15px_rgba(192,193,255,0.15)] hover:shadow-[0_0_20px_rgba(192,193,255,0.25)]" type="submit">
                    Send Recovery Link
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-xl text-center">
<a class="inline-flex items-center gap-xs font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>

                </a>
