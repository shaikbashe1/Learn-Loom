<style>

            background: radial-gradient(circle at 50% 0%, rgba(192, 193, 255, 0.15), transparent 70%);

<body class="bg-background text-on-background min-h-screen flex items-center justify-center glow-bg px-gutter antialiased">
<!-- Top Navigation Omitted: Intent is Transactional/Linear (Reset Password) -->
<main class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg md:font-display md:text-display text-primary tracking-tight mb-sm">LearnLoom</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure your developer console.</p>
</div>
<!-- Glassmorphism Card -->
<div class="bg-surface-container-low/80 backdrop-blur-md rounded-xl border border-outline-variant/60 p-xl shadow-[0_4px_30px_rgba(0,0,0,0.1)] relative overflow-hidden">
<!-- Subtle accent bar -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary"></div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-lg">Reset Password</h2>
<form class="space-y-lg" id="reset-password-form">
<!-- New Password Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="new-password">New Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-full py-md pl-12 pr-md font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none input-glow transition-all" id="new-password" name="new-password" placeholder="Enter new password" type="password"/>
</div>
</div>
<!-- Technical Validation Feedback -->
<div class="bg-surface-container-highest rounded-lg p-md border border-outline-variant/30">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-xs flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">terminal</span>
                        Password Strength Matrix
                    </p>
<div class="space-y-1 font-label-sm text-label-sm text-outline">
<div class="flex items-center gap-2 validation-req" id="req-length">
<span class="material-symbols-outlined text-[14px]">close</span>
<span>Min 8 characters</span>
</div>
<div class="flex items-center gap-2 validation-req" id="req-number">
<span class="material-symbols-outlined text-[14px]">close</span>
<span>Contains number</span>
</div>
<div class="flex items-center gap-2 validation-req" id="req-special">
<span class="material-symbols-outlined text-[14px]">close</span>
<span>Contains special char</span>
</div>
</div>
<!-- Progress Bar -->
<div class="mt-md h-1.5 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="h-full w-0 bg-error transition-all duration-300" id="strength-bar"></div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="confirm-password">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">enhanced_encryption</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/60 rounded-full py-md pl-12 pr-md font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none input-glow transition-all" id="confirm-password" name="confirm-password" placeholder="Confirm new password" type="password"/>
</div>
<p class="font-label-sm text-label-sm text-error hidden mt-xs pl-md" id="match-error">Passwords do not match.</p>
</div>
<!-- Submit Action -->
<div class="pt-sm">
<button class="w-full bg-surface-variant text-on-surface-variant font-label-md text-label-md py-md rounded-full transition-all duration-200 flex items-center justify-center gap-2 border border-outline-variant/30" disabled="" id="submit-btn" type="submit">
<span class="material-symbols-outlined">restart_alt</span>
                        Update Protocol
                    </button>
</div>
</form>
<div class="mt-lg text-center">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors underline decoration-primary/30 underline-offset-4" href="#">Return to Authentication</a>
</div>
</div>
</main>
<script>
        const passwordInput = document.getElementById('new-password');
        const confirmInput = document.getElementById('confirm-password');
        const submitBtn = document.getElementById('submit-btn');
        const matchError = document.getElementById('match-error');
        const strengthBar = document.getElementById('strength-bar');

        const reqLength = document.getElementById('req-length');
        const reqNumber = document.getElementById('req-number');
        const reqSpecial = document.getElementById('req-special');

        function updateRequirement(el, isValid) {
            const icon = el.querySelector('.material-symbols-outlined');
            if (isValid) {
                el.classList.remove('text-outline');
                el.classList.add('text-primary');
                icon.textContent = 'check';
            } else {
                el.classList.add('text-outline');
                el.classList.remove('text-primary');
                icon.textContent = 'close';
            }
            return isValid;
        }

        function validatePassword() {
            const val = passwordInput.value;
            
            const hasLength = updateRequirement(reqLength, val.length >= 8);
            const hasNumber = updateRequirement(reqNumber, /\d/.test(val));
            const hasSpecial = updateRequirement(reqSpecial, /[!@#$%^&*(),.?":{}|<>]/.test(val));

            let score = 0;
            if(hasLength) score++;
            if(hasNumber) score++;
            if(hasSpecial) score++;

            // Update strength bar
            strengthBar.style.width = `${(score / 3) * 100}%`;
            
            strengthBar.className = 'h-full transition-all duration-300 ';
            if(score === 0) strengthBar.classList.add('w-0', 'bg-error');
            else if(score === 1) strengthBar.classList.add('bg-error');
            else if(score === 2) strengthBar.classList.add('bg-tertiary');
            else strengthBar.classList.add('bg-primary', 'shadow-[0_0_8px_rgba(192,193,255,0.6)]'); // Add glow when full

            checkFormValidity(score === 3);
        }

        function checkFormValidity(isPasswordStrong) {
            const p1 = passwordInput.value;
            const p2 = confirmInput.value;
            const isMatch = p1 === p2 && p2 !== '';

            if (p2 !== '') {
                matchError.classList.toggle('hidden', isMatch);
            } else {
                matchError.classList.add('hidden');
            }

            if (isPasswordStrong && isMatch) {
                submitBtn.disabled = false;
                submitBtn.className = 'w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-full hover:bg-primary-container transition-all duration-200 flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(192,193,255,0.3)] cursor-pointer';
            } else {
                submitBtn.disabled = true;
                submitBtn.className = 'w-full bg-surface-variant text-on-surface-variant font-label-md text-label-md py-md rounded-full transition-all duration-200 flex items-center justify-center gap-2 border border-outline-variant/30 cursor-not-allowed';
            }
        }

        passwordInput.addEventListener('input', validatePassword);
        confirmInput.addEventListener('input', () => validatePassword()); // Re-evaluate total form

        document.getElementById('reset-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(!submitBtn.disabled) {
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Processing...';
                // Simulate API call
                setTimeout(() => {
                    submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Password Updated';
                    submitBtn.classList.remove('bg-primary');
                    submitBtn.classList.add('bg-[#10b981]', 'text-black'); // Temporary success color override for distinct feedback
                }, 1500);
            }
        });
    </script>
