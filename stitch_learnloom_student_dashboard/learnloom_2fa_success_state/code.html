<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>2FA Enabled - LearnLoom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#c0c1ff",
                        "on-tertiary": "#4f2500",
                        "on-surface-variant": "#c7c4d7",
                        "on-secondary-fixed-variant": "#6900b3",
                        "on-secondary": "#490080",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#ddb7ff",
                        "on-primary": "#1000a9",
                        "primary-container": "#8083ff",
                        "on-primary-container": "#0d0096",
                        "inverse-surface": "#e5e1e4",
                        "surface-container-lowest": "#0e0e10",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#d6a9ff",
                        "on-secondary-fixed": "#2c0051",
                        "surface-container-low": "#1c1b1d",
                        "inverse-primary": "#494bd6",
                        "background": "#131315",
                        "surface": "#131315",
                        "inverse-on-surface": "#313032",
                        "surface-bright": "#39393b",
                        "surface-container-high": "#2a2a2c",
                        "on-tertiary-fixed": "#301400",
                        "secondary": "#ddb7ff",
                        "on-surface": "#e5e1e4",
                        "surface-container": "#201f22",
                        "on-background": "#e5e1e4",
                        "surface-dim": "#131315",
                        "secondary-fixed": "#f0dbff",
                        "primary-fixed": "#e1e0ff",
                        "outline": "#908fa0",
                        "secondary-container": "#6f00be",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-tertiary-container": "#452000",
                        "tertiary-container": "#d97721",
                        "surface-variant": "#353437",
                        "surface-container-highest": "#353437",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "tertiary": "#ffb783",
                        "on-primary-fixed": "#07006c",
                        "outline-variant": "#464554",
                        "tertiary-fixed": "#ffdcc5",
                        "tertiary-fixed-dim": "#ffb783",
                        "surface-tint": "#c0c1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "2xl": "3rem",
                        "xs": "0.25rem",
                        "margin": "2rem",
                        "lg": "1.5rem",
                        "md": "1rem",
                        "sm": "0.5rem",
                        "gutter": "1.5rem",
                        "xl": "2rem",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "label-sm": ["JetBrains Mono"],
                        "body-sm": ["Geist"],
                        "label-md": ["JetBrains Mono"],
                        "headline-lg": ["Geist"],
                        "headline-lg-mobile": ["Geist"],
                        "display": ["Geist"],
                        "body-md": ["Geist"],
                        "body-lg": ["Geist"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.05em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .animate-check {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }
        .animate-circle {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawCircle 0.6s ease-out forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }
        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }
        .fade-in-up {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md font-body-md antialiased selection:bg-primary/30 selection:text-primary">
<!-- Decorative background elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl transform -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary-container/5 rounded-full blur-3xl transform translate-x-1/2 translate-y-1/2"></div>
</div>
<!-- Main Content Container (Suppressed Shells as per instructions for linear/success screens) -->
<main class="relative z-10 w-full max-w-lg fade-in-up">
<!-- Brand / Logo Area -->
<div class="flex justify-center mb-xl fade-in-up delay-100">
<div class="font-display text-headline-md font-bold text-primary tracking-tight">
                LearnLoom
            </div>
</div>
<!-- Success Card -->
<div class="bg-surface-container-low border border-outline-variant/60 rounded-xl p-xl shadow-lg relative overflow-hidden fade-in-up delay-200">
<!-- Subtle top border highlight -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-secondary"></div>
<div class="flex flex-col items-center text-center">
<!-- Animated Checkmark Icon -->
<div class="mb-lg relative w-24 h-24 flex items-center justify-center">
<!-- Glow effect -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl scale-75 animate-pulse"></div>
<svg class="w-full h-full text-primary relative z-10" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 52 52">
<circle class="animate-circle" cx="26" cy="26" fill="none" r="24" stroke="currentColor" stroke-opacity="0.2"></circle>
<circle class="animate-circle" cx="26" cy="26" fill="none" r="24" stroke="currentColor"></circle>
<path class="animate-check" d="M16 26 L24 34 L38 18" fill="none"></path>
</svg>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">
                    Two-Factor Authentication Enabled
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-sm">
                    Your account is now protected with an additional layer of security. Use your authenticator app the next time you log in.
                </p>
<!-- Status Summary Box -->
<div class="w-full bg-surface-container border border-outline-variant/40 rounded-lg p-md mb-xl flex items-center justify-between group hover:border-outline-variant/80 transition-colors fade-in-up delay-300">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">
                            security
                        </span>
<div class="flex flex-col text-left">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Method</span>
<span class="font-body-md text-body-md text-on-surface">Authenticator App</span>
</div>
</div>
<div class="flex items-center gap-xs bg-primary/10 px-sm py-xs rounded-full border border-primary/20">
<div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(192,193,255,0.8)] animate-pulse"></div>
<span class="font-label-md text-label-md text-primary">Active</span>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-md fade-in-up delay-400">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md px-lg rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex justify-center items-center gap-sm">
                        Back to Security Settings
                    </button>
<button class="w-full bg-transparent text-on-surface-variant border border-outline-variant/40 font-label-md text-label-md py-md px-lg rounded-lg hover:border-outline-variant hover:text-on-surface active:scale-[0.98] transition-all flex justify-center items-center gap-sm group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors">
                            download
                        </span>
                        Download Recovery Codes
                    </button>
</div>
</div>
</div>
<!-- Trust Indicator -->
<div class="mt-lg text-center fade-in-up delay-400">
<p class="font-label-sm text-label-sm text-on-surface-variant flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[16px]">lock</span>
                Secured by LearnLoom Auth
            </p>
</div>
</main>
</body></html>
